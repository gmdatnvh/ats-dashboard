<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATS Dashboard</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --text: #c9d1d9; --text2: #8b949e;
  --border: #30363d;
  --green: #3fb950; --red: #f85149; --blue: #58a6ff; --yellow: #d29922;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; font-size:14px; padding:16px; max-width:960px; margin:0 auto; }

.header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--bg2); border-radius:8px; margin-bottom:16px; }
.header h1 { font-size:18px; font-weight:700; }
.updated { font-size:12px; color:var(--text2); }

.summary { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; margin-bottom:16px; }
@media (max-width:600px) { .summary { grid-template-columns:1fr 1fr; } }
.summary-item { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:12px; }
.summary-label { font-size:11px; color:var(--text2); text-transform:uppercase; }
.summary-value { font-size:18px; font-weight:700; margin-top:4px; }
.summary-value.big { font-size:22px; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
@media (max-width:768px) { .grid { grid-template-columns:1fr; } }

.card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px; }
.card-title { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; }

.c-green { color:var(--green); } .c-red { color:var(--red); } .c-blue { color:var(--blue); }
table { width:100%; border-collapse:collapse; }
th { text-align:left; padding:6px 8px; font-size:11px; color:var(--text2); border-bottom:1px solid var(--border); }
td { padding:6px 8px; font-size:13px; border-bottom:1px solid rgba(48,54,61,0.5); }
.right { text-align:right; }
.mono { font-family:'SF Mono',Menlo,monospace; }

.stock-section { margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.stock-section:last-child { border-bottom:none; margin-bottom:0; }
.stock-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.stock-name { font-size:14px; font-weight:700; }
.stock-type { font-size:11px; color:var(--text2); margin-bottom:6px; }
.tag { font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; }
.tag-held { background:rgba(63,185,80,0.2); color:var(--green); }
.tag-watch { background:rgba(210,153,34,0.2); color:var(--yellow); }
.tag-halt { background:rgba(248,81,73,0.2); color:var(--red); }
.rule { padding:3px 0; font-size:12px; }
.rule-buy::before { content:'● '; color:var(--blue); }
.rule-sl::before { content:'■ '; color:var(--red); }
.rule-tp::before { content:'▲ '; color:var(--green); }

.chart-card { margin-bottom:16px; }
.chart-svg { width:100%; background:var(--bg2); border-radius:4px; }
.legend { display:flex; flex-wrap:wrap; gap:6px 14px; padding:8px 0; font-size:12px; }
.legend-item { display:inline-flex; align-items:center; gap:4px; }
.legend-dot { width:10px; height:10px; border-radius:2px; display:inline-block; }

.loading { text-align:center; padding:60px; color:var(--text2); font-size:16px; }
</style>
</head>
<body>

<div class="header">
  <h1>ATS Dashboard</h1>
  <span class="updated" id="updated">로딩 중...</span>
</div>
<div id="content"><div class="loading">데이터 로딩 중...</div></div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbzxEE4tbeSGjFpvrmv6_ac7nWsm-2sJHO9uY_XUUsS3oMZDz3xAcIt78HwqReu2lLeC/exec?api=1';

var fmt = function(n) { return n != null ? n.toLocaleString('ko-KR') : '-'; };
var fmtPct = function(n) { return n != null ? (n >= 0 ? '+' : '') + n.toFixed(2) + '%' : ''; };
var pnlCls = function(n) { return n >= 0 ? 'c-green' : 'c-red'; };
var COLORS = ['#58a6ff','#3fb950','#f85149','#d2a8ff','#f0883e','#79c0ff','#56d364','#ff7b72','#bc8cff','#ffa657'];

function buildSvgChart(seriesList, width, height) {
  var PAD_L = 50, PAD_R = 10, PAD_T = 10, PAD_B = 25;
  var W = width, H = height;
  var cW = W - PAD_L - PAD_R, cH = H - PAD_T - PAD_B;
  var allPcts = [], allDates = [];
  for (var i = 0; i < seriesList.length; i++) {
    var pts = seriesList[i].points;
    for (var j = 0; j < pts.length; j++) {
      allPcts.push(pts[j].pct);
      if (allDates.indexOf(pts[j].date) === -1) allDates.push(pts[j].date);
    }
  }
  allDates.sort();
  if (allPcts.length === 0) return '';
  var minP = Math.min.apply(null, allPcts), maxP = Math.max.apply(null, allPcts);
  var range = maxP - minP || 1;
  minP -= range * 0.1; maxP += range * 0.1; range = maxP - minP;
  var toX = function(date) { return PAD_L + (allDates.indexOf(date) / Math.max(allDates.length - 1, 1)) * cW; };
  var toY = function(pct) { return PAD_T + (1 - (pct - minP) / range) * cH; };
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg" xmlns="http://www.w3.org/2000/svg">';
  svg += '<rect width="'+W+'" height="'+H+'" fill="#161b22" rx="4"/>';
  var zeroY = toY(0);
  if (zeroY > PAD_T && zeroY < H - PAD_B) {
    svg += '<rect x="'+PAD_L+'" y="'+PAD_T+'" width="'+cW+'" height="'+(zeroY-PAD_T)+'" fill="rgba(63,185,80,0.06)"/>';
    svg += '<rect x="'+PAD_L+'" y="'+zeroY+'" width="'+cW+'" height="'+(H-PAD_B-zeroY)+'" fill="rgba(248,81,73,0.06)"/>';
    svg += '<line x1="'+PAD_L+'" y1="'+zeroY+'" x2="'+(W-PAD_R)+'" y2="'+zeroY+'" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>';
    svg += '<text x="'+(PAD_L-4)+'" y="'+(zeroY+4)+'" text-anchor="end" fill="#8b949e" font-size="10">0%</text>';
  }
  for (var g = 0; g <= 4; g++) {
    var val = minP + (range * g / 4), gy = toY(val);
    svg += '<line x1="'+PAD_L+'" y1="'+gy+'" x2="'+(W-PAD_R)+'" y2="'+gy+'" stroke="rgba(48,54,61,0.5)" stroke-width="0.5"/>';
    svg += '<text x="'+(PAD_L-4)+'" y="'+(gy+3)+'" text-anchor="end" fill="#8b949e" font-size="9">'+val.toFixed(1)+'%</text>';
  }
  var step = Math.max(1, Math.floor(allDates.length / 5));
  for (var d = 0; d < allDates.length; d += step) {
    svg += '<text x="'+toX(allDates[d])+'" y="'+(H-5)+'" text-anchor="middle" fill="#8b949e" font-size="9">'+allDates[d].substring(5)+'</text>';
  }
  for (var s = 0; s < seriesList.length; s++) {
    var color = COLORS[s % COLORS.length], pts = seriesList[s].points, pathD = '';
    for (var p = 0; p < pts.length; p++) { pathD += (p===0?'M':'L')+toX(pts[p].date).toFixed(1)+','+toY(pts[p].pct).toFixed(1); }
    svg += '<path d="'+pathD+'" fill="none" stroke="'+color+'" stroke-width="2"/>';
  }
  svg += '</svg>';
  return svg;
}

function render(data) {
  var pf = data.portfolio;
  var pnl30 = data.pnl30 || [];
  document.getElementById('updated').textContent = '갱신: ' + data.updated_at;
  var html = '';

  // 자산 요약
  html += '<div class="summary">';
  html += '<div class="summary-item"><div class="summary-label">총 자산</div><div class="summary-value big">'+fmt(pf.total)+'원</div></div>';
  html += '<div class="summary-item"><div class="summary-label">평가 손익</div><div class="summary-value big '+pnlCls(pf.total_pnl)+'">'+(pf.total_pnl>=0?'+':'')+fmt(pf.total_pnl)+'원</div></div>';
  html += '<div class="summary-item"><div class="summary-label">가용 현금</div><div class="summary-value">'+fmt(pf.cash)+'원</div></div>';
  html += '<div class="summary-item"><div class="summary-label">평가금액</div><div class="summary-value">'+fmt(pf.total_eval)+'원</div></div>';
  html += '</div>';

  // KOSPI/KOSDAQ + HALT
  if (pf.kospi_pct != null) {
    var kp = pf.kospi_pct, kq = pf.kosdaq_pct || 0;
    var halt = pf.halt_new_buy;
    var kColor = halt ? 'var(--red)' : kp >= 0 ? 'var(--green)' : 'var(--yellow)';
    var barBg = halt ? 'rgba(248,81,73,0.15)' : 'rgba(48,54,61,0.5)';
    var barBorder = halt ? 'var(--red)' : 'var(--border)';
    html += '<div style="background:'+barBg+';border:1px solid '+barBorder+';border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
    html += '<span style="font-size:13px">KOSPI <span style="color:'+kColor+';font-weight:700">'+(kp>=0?'+':'')+kp.toFixed(2)+'%</span> &nbsp; KOSDAQ <span style="color:'+(kq>=0?'var(--green)':'var(--yellow)')+';font-weight:700">'+(kq>=0?'+':'')+kq.toFixed(2)+'%</span></span>';
    if (halt) {
      html += '<span style="color:var(--red);font-weight:700;font-size:13px">\u26D4 HALT: '+(pf.halt_reason||'\uB9E4\uC218\uCC28\uB2E8')+'</span>';
    } else {
      html += '<span style="color:var(--green);font-size:12px">\u2705 \uB9E4\uC218 \uAC00\uB2A5</span>';
    }
    html += '</div>';
  }

  // 30일 수익률 차트
  if (pnl30.length > 0) {
    html += '<div class="card chart-card"><div class="card-title">30일 수익률 변화</div>';
    html += buildSvgChart(pnl30, 900, 350);
    html += '<div class="legend">';
    for (var i = 0; i < pnl30.length; i++) {
      var color = COLORS[i % COLORS.length];
      var last = pnl30[i].points.length > 0 ? pnl30[i].points[pnl30[i].points.length-1].pct : 0;
      html += '<span class="legend-item"><span class="legend-dot" style="background:'+color+'"></span>'+pnl30[i].name+' <span style="color:'+(last>=0?'var(--green)':'var(--red)')+';font-weight:600">'+(last>=0?'+':'')+last.toFixed(2)+'%</span></span>';
    }
    html += '</div></div>';
  }

  html += '<div class="grid">';

  // 보유 종목
  html += '<div class="card"><div class="card-title">보유 종목</div>';
  if (pf.positions && pf.positions.length > 0) {
    html += '<table><thead><tr><th>종목</th><th class="right">수량</th><th class="right">현재가</th><th class="right">손익</th><th class="right">수익률</th></tr></thead><tbody>';
    for (var p = 0; p < pf.positions.length; p++) {
      var pos = pf.positions[p];
      html += '<tr><td>'+pos.name+'</td><td class="right mono">'+pos.qty+'</td><td class="right mono">'+fmt(pos.cur_price)+'</td><td class="right mono '+pnlCls(pos.pnl)+'">'+(pos.pnl>=0?'+':'')+fmt(pos.pnl)+'</td><td class="right mono '+pnlCls(pos.pnl_pct)+'">'+fmtPct(pos.pnl_pct)+'</td></tr>';
    }
    html += '</tbody></table>';
  } else {
    html += '<div style="color:var(--text2);text-align:center;padding:20px">보유 종목 없음</div>';
  }
  html += '</div>';

  // 전략 규칙
  html += '<div class="card"><div class="card-title">전략 규칙</div>';
  var watched = (pf.watched || []).slice().sort(function(a,b) {
    var aH = (pf.positions||[]).some(function(p){return p.symbol===a.symbol});
    var bH = (pf.positions||[]).some(function(p){return p.symbol===b.symbol});
    return aH !== bH ? (aH ? 1 : -1) : 0;
  });
  for (var w = 0; w < watched.length; w++) {
    var item = watched[w];
    var isHeld = (pf.positions||[]).some(function(p){return p.symbol===item.symbol});
    var nameOnly = item.name.replace(/\s*\[.*\]/, '');
    var typeMatch = item.name.match(/\[(.+)\]/);
    var tagCls = isHeld ? 'tag-held' : pf.halt_new_buy ? 'tag-halt' : 'tag-watch';
    var tagText = isHeld ? '보유' : pf.halt_new_buy ? '매수중지' : '감시';
    html += '<div class="stock-section">';
    html += '<div class="stock-header"><span class="stock-name">'+nameOnly+'</span><span class="tag '+tagCls+'">'+tagText+'</span></div>';
    if (typeMatch) html += '<div class="stock-type">'+typeMatch[1]+'</div>';
    var rules = item.rules || [];
    for (var r = 0; r < rules.length; r++) {
      var cls = rules[r].color==='buy'?'rule-buy':rules[r].color==='stoploss'?'rule-sl':rules[r].color==='white'?'':'rule-tp';
      html += '<div class="rule '+cls+'">'+rules[r].text+'</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';

  document.getElementById('content').innerHTML = html;
}

// 데이터 로드 (JSONP — CORS 우회, 모든 브라우저 호환)
function loadData() {
  var script = document.createElement('script');
  script.src = API_URL + '&callback=onDataLoaded&_=' + Date.now();
  script.onerror = function() {
    // JSONP 실패 시 직접 fetch 시도
    fetch(API_URL).then(function(r){return r.json()}).then(function(d){render(d)}).catch(function(e){
      document.getElementById('content').innerHTML = '<div class="loading">로드 실패</div>';
    });
  };
  document.body.appendChild(script);
}

function onDataLoaded(raw) {
  try {
    var data = typeof raw === 'string' ? JSON.parse(raw) : raw;
    render(data);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">파싱 오류: '+e.message+'</div>';
  }
}

// fetch로 직접 로드 (Apps Script는 CORS 허용)
fetch(API_URL)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    render(data);
  })
  .catch(function(e) {
    document.getElementById('content').innerHTML = '<div class="loading">로드 실패: '+e.message+'</div>';
  });
</script>
</body>
</html>
